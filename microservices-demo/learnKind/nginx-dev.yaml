apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-demo

spec:
  replicas: 6

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        command:
        - /bin/sh
        - -c
        - |
          echo "
          <h1>Kubernetes Demo</h1>
          <p>Pod: $POD_NAME</p>
          <p>Pod IP: $POD_IP</p>
          <p>Node: $NODE_NAME</p>
          " > /usr/share/nginx/html/index.html

          nginx -g 'daemon off;'

---
apiVersion: v1
kind: Service

metadata:
  name: nginx-service

spec:
  type: NodePort

  selector:
    app: nginx-demo

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000