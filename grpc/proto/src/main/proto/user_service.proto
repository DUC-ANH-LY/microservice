syntax = "proto3";

package benchmark;

option java_multiple_files = true;
option java_package = "com.benchmark.proto";
option java_outer_classname = "UserServiceProto";

// ---------- Messages ----------

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  string department = 5;
}

// --- GetUser ---
message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  User user = 1;
}

// --- CreateUser ---
message CreateUserRequest {
  string name = 1;
  string email = 2;
  int32 age = 3;
  string department = 4;
}

message CreateUserResponse {
  User user = 1;
}

// --- ListUsers ---
message ListUsersRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

// --- BulkCreateUsers ---
message BulkCreateUsersRequest {
  repeated CreateUserRequest users = 1;
}

message BulkCreateUsersResponse {
  repeated User users = 1;
  int32 created_count = 2;
}

// ---------- Service ----------

service UserService {
  // Simple unary call - small payload
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // Unary call - medium payload write
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // Returns a list - larger response payload
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Bulk write - large request payload
  rpc BulkCreateUsers(BulkCreateUsersRequest) returns (BulkCreateUsersResponse);
}
